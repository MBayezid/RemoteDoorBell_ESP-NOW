; ============================================================
;  PlatformIO Project Configuration — Doorbell System ESP8266
;
;  RECEIVER ENVIRONMENTS (pick one matching your hardware):
;    receiver_12e  → ESP-12E/F on NodeMCU v2/v3 / Lolin / D1 Mini (4MB, recommended)
;    receiver_01   → ESP-01 (512KB, fallback — limited RAM/flash)
;
;  REMOTE ENVIRONMENT:
;    remote        → ESP-01 (512KB, battery powered transmitter)
;
;  Build & upload:
;    pio run -e receiver_12e -t upload   ← primary receiver
;    pio run -e receiver_01  -t upload   ← fallback receiver on ESP-01
;    pio run -e remote       -t upload   ← remote transmitter
;
;  Monitor:
;    pio device monitor -e receiver_12e
;    pio device monitor -e receiver_01
;    pio device monitor -e remote
;
;  Directory structure:
;    doorbell/
;    ├── platformio.ini
;    └── src/
;        ├── aes.h
;        ├── aes.c
;        ├── remote_main.cpp
;        └── receiver_main.cpp
;
;  All project constants are defined in source files.
;  Do NOT add -D flag duplicates of source #defines here.
; ============================================================

[platformio]
default_envs = receiver_12e

; ------------------------------------------------------------
;  Shared base
; ------------------------------------------------------------
[env]
framework     = arduino
platform      = espressif8266
monitor_speed = 74880      ; matches Serial.begin(74880) + captures boot ROM output

build_flags =
    -std=c++11

; ------------------------------------------------------------
;  Shared receiver base — settings common to both receiver targets
;  Not a real env (no board defined) — only inherited via extends
; ------------------------------------------------------------
[env:receiver_base]
build_src_filter = -<*> +<aes.c> +<receiver_main.cpp>

; ------------------------------------------------------------
;  RECEIVER — ESP-12E/F (NodeMCU v2/v3 / Lolin / Wemos D1 Mini)
;  Primary receiver hardware. 4MB flash, full RAM, USB onboard.
;
;  Board swap guide:
;    NodeMCU v2 (CP2102) → nodemcuv2
;    NodeMCU v3 / Lolin  → nodemcuv2  (same board def, diff USB chip)
;    Wemos D1 Mini       → d1_mini
;
;  Auto-resets into flash mode via USB — no manual wiring needed.
;  CH340 driver: https://www.wch-ic.com/downloads/CH341SER_EXE.html
;
;  OTA after first flash (uncomment):
;    upload_protocol = espota
;    upload_port     = 192.168.x.x
; ------------------------------------------------------------
[env:receiver_12e]
extends         = env:receiver_base
board           = nodemcuv2
board_build.flash_mode = dio

upload_port     = /dev/ttyUSB0
upload_speed    = 921600
monitor_port    = /dev/ttyUSB0

; ------------------------------------------------------------
;  RECEIVER — ESP-01 (512KB flash fallback)
;  Use when ESP-12E is unavailable. Same receiver_main.cpp,
;  different board constraints.
;
;  512KB is tight with ESP-NOW + AES + EEPROM but fits.
;  Confirmed working with eagle.flash.512k64.ld (64KB SPIFFS).
;
;  No USB — flash via CH340 programmer:
;    1. GPIO0 → GND, power on → flash mode
;    2. pio run -e receiver_01 -t upload
;    3. GPIO0 float, power cycle → run
;
;  Output pin note for ESP-01 receiver:
;    Change OUTPUT_PIN in receiver_main.cpp from D5 to GPIO2 (2)
;    D5 is a NodeMCU alias — not valid on bare ESP-01.
; ------------------------------------------------------------
[env:receiver_01]
extends         = env:receiver_base
board           = esp01
board_build.flash_mode  = dout
board_build.ldscript    = eagle.flash.512k64.ld
build_flags =
    -DOUTPUT_PIN=2
    -DPAIRING_BTN_PIN=0

upload_port     = COM4         ; same port, same programmer as remote if needed
upload_speed    = 115200
monitor_port    = COM4

; ------------------------------------------------------------
;  REMOTE — ESP-01 (512KB, battery powered transmitter)
;
;  Flash via CH340 programmer:
;    1. GPIO0 → GND, power on → flash mode
;    2. pio run -e remote -t upload
;    3. GPIO0 float, power cycle → run
;
;  Field wiring:
;    RST   → 10K pullup to VCC + button to GND  (doorbell trigger)
;    GPIO0 → 10K pullup to VCC, floating
;    GPIO2 → VCC → 330Ω → LED → GPIO2  (active LOW status LED)
; ------------------------------------------------------------
[env:remote]
board                   = esp01
board_build.flash_mode  = dout
board_build.ldscript    = eagle.flash.512k64.ld

upload_port             = /dev/ttyUSB0
upload_speed            = 115200
monitor_port            = /dev/ttyUSB0

build_src_filter        = -<*> +<aes.c> +<remote_main.cpp>